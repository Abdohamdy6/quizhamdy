<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hamdy Quiz - تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26; --border: #2a2a3e;
  --accent: #6c63ff; --accent2: #ff6b9d; --gold: #ffd700;
  --text: #e8e8f0; --text-dim: #7a7a9a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Cairo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background: radial-gradient(ellipse 80% 50% at 20% 20%,rgba(108,99,255,.08) 0%,transparent 60%),
              radial-gradient(ellipse 60% 40% at 80% 80%,rgba(255,107,157,.06) 0%,transparent 60%);
}
.logo { text-align:center; margin-bottom:40px; position:relative; z-index:1; }
.logo h1 { font-family:'Tajawal',sans-serif; font-size:60px; font-weight:900; letter-spacing:-2px; line-height:1;
  background:linear-gradient(135deg,var(--accent),var(--accent2),var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.logo p { color:var(--text-dim); font-size:15px; margin-top:8px; letter-spacing:4px; text-transform:uppercase; }
.auth-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:40px; width:100%; max-width:400px; text-align:center; position:relative; z-index:1; }
.auth-card h3 { font-size:22px; font-weight:700; margin-bottom:24px; }
.input-field { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:14px 16px;
  color:var(--text); font-family:'Cairo',sans-serif; font-size:15px; outline:none; transition:border-color .3s,box-shadow .3s; margin-bottom:16px; }
.input-field:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(108,99,255,.15); }
.btn-primary { background:linear-gradient(135deg,var(--accent),#8b83ff); color:white; border:none; border-radius:14px; padding:14px;
  font-family:'Cairo',sans-serif; font-size:16px; font-weight:700; cursor:pointer; transition:all .3s; box-shadow:0 4px 20px rgba(108,99,255,.4); display:block; width: 100%; margin-top:8px; }
.btn-primary:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 30px rgba(108,99,255,.5); }
.btn-primary:disabled { opacity:.5; cursor:not-allowed; transform:none; }
.auth-switch { margin-top: 20px; color: var(--text-dim); font-size: 14px; cursor: pointer; transition: color .3s; }
.auth-switch:hover { color: var(--accent); }
.toast { position:fixed; bottom:24px; left:50%; width: 90%; max-width: 400px; text-align: center; transform:translateX(-50%) translateY(100px); background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:12px 24px; font-size:14px; font-weight:600; z-index:9999; transition:transform .3s cubic-bezier(.34,1.56,.64,1); pointer-events:none; }
.toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="logo">
  <h1>Hamdy Quiz</h1>
  <p>لعبة المعلومات العامة</p>
</div>
<div class="auth-card">
  <h3 id="auth-title">تسجيل الدخول</h3>
  <input type="text" id="auth-username" class="input-field" placeholder="اسم المستخدم" autocomplete="off">
  <input type="password" id="auth-password" class="input-field" placeholder="كلمة المرور">
  <button class="btn-primary" id="btn-auth" onclick="handleAuth()">دخول</button>
  <div class="auth-switch" id="auth-switch" onclick="toggleAuthMode()">ليس لديك حساب؟ سجل الآن</div>
</div>

<script>
let isRegisterMode = false;

function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = color || 'var(--border)';
  t.style.color = color || 'var(--text)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function toggleAuthMode() {
  isRegisterMode = !isRegisterMode;
  document.getElementById('auth-title').textContent = isRegisterMode ? 'إنشاء حساب جديد' : 'تسجيل الدخول';
  document.getElementById('btn-auth').textContent = isRegisterMode ? 'سجل' : 'دخول';
  document.getElementById('auth-switch').textContent = isRegisterMode ? 'لديك حساب بالفعل؟ سجل دخول' : 'ليس لديك حساب؟ سجل الآن';
}

async function handleAuth() {
  const username = document.getElementById('auth-username').value.trim();
  const password = document.getElementById('auth-password').value;
  const btn = document.getElementById('btn-auth');

  if(!username || !password) return showToast('ادخل البيانات كاملة','#ff6b9d');

  btn.disabled = true;
  btn.textContent = 'جاري التحميل...';

  const endpoint = isRegisterMode ? '/api/auth/register' : '/api/auth/login';
  try {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    
    if (!res.ok) throw new Error(data.error || 'حدث خطأ');
    
    // حفظ التوكن في المتصفح
    localStorage.setItem('token', data.token);
    localStorage.setItem('username', data.username);
    
    showToast('تم بنجاح! جاري تحويلك...', '#00d4aa');
    setTimeout(() => { window.location.href = 'online.html'; }, 1000);

  } catch(e) {
    showToast(e.message, '#ff6b9d');
    btn.disabled = false;
    btn.textContent = isRegisterMode ? 'سجل' : 'دخول';
  }
}
</script>
</body>
</html>
