<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hamdy Quiz — دخول</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--sur:#12121a;--sur2:#1a1a26;--brd:#2a2a3e;--acc:#6c63ff;--acc2:#ff6b9d;--acc3:#00d4aa;--gold:#ffd700;--txt:#e8e8f0;--dim:#7a7a9a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 50% at 20% 20%,rgba(108,99,255,.10) 0%,transparent 60%),
             radial-gradient(ellipse 60% 40% at 80% 80%,rgba(255,107,157,.07) 0%,transparent 60%);}

.wrap{width:100%;max-width:420px;position:relative;z-index:1;}
.logo{text-align:center;margin-bottom:32px;}
.logo h1{font-size:54px;font-weight:900;letter-spacing:-2px;
  background:linear-gradient(135deg,var(--acc),var(--acc2),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo p{color:var(--dim);font-size:13px;letter-spacing:3px;text-transform:uppercase;margin-top:4px;}

.card{background:var(--sur);border:1px solid var(--brd);border-radius:20px;padding:28px;}
.tabs{display:flex;gap:8px;margin-bottom:24px;}
.tab{flex:1;padding:10px;border:1px solid var(--brd);border-radius:10px;background:transparent;color:var(--dim);
  cursor:pointer;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;transition:all .2s;}
.tab.active{background:var(--acc);border-color:var(--acc);color:#fff;}

.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:12px;color:var(--dim);margin-bottom:6px;font-weight:600;}
.inp{width:100%;background:var(--sur2);border:1px solid var(--brd);border-radius:12px;padding:12px 16px;
  color:var(--txt);font-family:'Cairo',sans-serif;font-size:15px;outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--acc);}
.hint{font-size:11px;color:var(--dim);margin-top:4px;}

.btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--acc);color:#fff;
  font-family:'Cairo',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:opacity .2s;margin-top:8px;}
.btn:hover{opacity:.88;}
.btn:disabled{opacity:.45;cursor:not-allowed;}

.err{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#f87171;
  border-radius:10px;padding:10px 14px;font-size:13px;margin-top:12px;display:none;}
.err.show{display:block;}
.suc{background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.3);color:var(--acc3);
  border-radius:10px;padding:10px 14px;font-size:13px;margin-top:12px;display:none;}
.suc.show{display:block;}

.panel{display:none;} .panel.active{display:block;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <h1>HQ</h1>
    <p>Hamdy Quiz</p>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">🔑 دخول</button>
      <button class="tab" onclick="switchTab('register')">📝 حساب جديد</button>
    </div>

    <!-- LOGIN -->
    <div class="panel active" id="panel-login">
      <div class="form-group">
        <label>اليوزرنيم</label>
        <input class="inp" id="l-user" placeholder="username" autocomplete="username">
      </div>
      <div class="form-group">
        <label>الباسورد</label>
        <input class="inp" id="l-pass" type="password" placeholder="••••••" autocomplete="current-password">
      </div>
      <button class="btn" id="l-btn" onclick="doLogin()">دخول ←</button>
      <div class="err" id="l-err"></div>
    </div>

    <!-- REGISTER -->
    <div class="panel" id="panel-register">
      <div class="form-group">
        <label>اليوزرنيم <span style="color:var(--dim)">(مش هيتغير)</span></label>
        <input class="inp" id="r-user" placeholder="حروف وأرقام وشرطة سفلية" autocomplete="username">
        <div class="hint">مستخدم في ربط سجل الأسئلة — مش ملازم تعرفه حد</div>
      </div>
      <div class="form-group">
        <label>الاسم المعروض</label>
        <input class="inp" id="r-name" placeholder="الاسم اللي هيشوفه الخصم" autocomplete="nickname">
        <div class="hint">تقدر تغيره متى ما حبيت</div>
      </div>
      <div class="form-group">
        <label>الباسورد</label>
        <input class="inp" id="r-pass" type="password" placeholder="6 حروف على الأقل" autocomplete="new-password">
      </div>
      <button class="btn" id="r-btn" onclick="doRegister()">إنشاء حساب ←</button>
      <div class="err" id="r-err"></div>
      <div class="suc" id="r-suc"></div>
    </div>
  </div>
</div>

<script>
// If already logged in, redirect
const stored = localStorage.getItem('hq_session');
if (stored) {
  try {
    const s = JSON.parse(stored);
    if (s.token) window.location.href = '/';
  } catch(e) { localStorage.removeItem('hq_session'); }
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('panel-login').classList.toggle('active', tab==='login');
  document.getElementById('panel-register').classList.toggle('active', tab==='register');
}

function saveSession(data) {
  localStorage.setItem('hq_session', JSON.stringify({ token: data.token, userId: data.userId, displayName: data.displayName, username: data.username }));
}

async function doLogin() {
  const btn = document.getElementById('l-btn');
  const err = document.getElementById('l-err');
  err.classList.remove('show');
  btn.disabled = true; btn.textContent = '...';
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username: document.getElementById('l-user').value.trim(), password: document.getElementById('l-pass').value })
    });
    const d = await r.json();
    if (d.error) { err.textContent = d.error; err.classList.add('show'); }
    else { saveSession(d); window.location.href = '/'; }
  } catch(e) { err.textContent = 'خطأ في الاتصال'; err.classList.add('show'); }
  btn.disabled = false; btn.textContent = 'دخول ←';
}

async function doRegister() {
  const btn = document.getElementById('r-btn');
  const err = document.getElementById('r-err');
  const suc = document.getElementById('r-suc');
  err.classList.remove('show'); suc.classList.remove('show');
  btn.disabled = true; btn.textContent = '...';
  try {
    const r = await fetch('/api/auth/register', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        username: document.getElementById('r-user').value.trim(),
        displayName: document.getElementById('r-name').value.trim(),
        password: document.getElementById('r-pass').value,
      })
    });
    const d = await r.json();
    if (d.error) { err.textContent = d.error; err.classList.add('show'); }
    else { saveSession(d); window.location.href = '/'; }
  } catch(e) { err.textContent = 'خطأ في الاتصال'; err.classList.add('show'); }
  btn.disabled = false; btn.textContent = 'إنشاء حساب ←';
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const login = document.getElementById('panel-login').classList.contains('active');
  if (login) doLogin(); else doRegister();
});
</script>
</body>
</html>
